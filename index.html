<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sondage Rééducation de la Main</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
        }
        .container {
            text-align: center;
            background: white;
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            max-width: 600px;
            width: 100%;
        }
        h1 {
            color: #4facfe;
            margin-bottom: 30px;
        }
        .btn {
            display: inline-block;
            margin: 15px;
            padding: 20px 40px;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            text-decoration: none;
            border-radius: 25px;
            font-size: 1.2em;
            transition: transform 0.3s;
        }
        .btn:hover {
            transform: translateY(-5px);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏥 Questionnaire sur la rééducation de la main</h1>
        <p>Choisissez votre profil :</p>
        <a href="/doctors" class="btn">👨‍⚕️ Professionnel de santé</a>
        <a href="/patients" class="btn">👥 Patient</a>
    </div>
</body>
</html>
